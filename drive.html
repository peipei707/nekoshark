<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>nekoSHARK · 破浪</title>
<meta name="description" content="一只猫鲨,劈开大海破浪前进。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#7FC9EC;font-family:"Space Grotesk",sans-serif;color:#0e2230}
  #c{position:fixed;inset:0;display:block}
  .ui{position:fixed;z-index:10;pointer-events:none}
  .top{top:max(16px,env(safe-area-inset-top));left:18px;right:18px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .badge{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.14em;background:rgba(14,34,48,.8);color:#F4EEE2;padding:8px 12px;border-radius:8px}
  .badge b{color:#F2901C}
  .help{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.05em;text-align:right;color:#0e2230;line-height:1.7;text-shadow:0 1px 2px rgba(255,255,255,.5)}
  .back{pointer-events:auto;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.1em;
    background:#F2901C;color:#17130E;border:2px solid #17130E;box-shadow:3px 3px 0 #17130E;padding:8px 12px;border-radius:6px}
  .prompt{left:50%;bottom:calc(120px + env(safe-area-inset-bottom));transform:translateX(-50%);
    font-family:"Space Mono",monospace;font-size:14px;background:rgba(14,34,48,.9);color:#F4EEE2;padding:10px 16px;border-radius:10px;opacity:0;transition:opacity .2s}
  .prompt.on{opacity:1}.prompt b{color:#F2901C}
  .joy{position:fixed;left:max(22px,env(safe-area-inset-left));bottom:calc(26px + env(safe-area-inset-bottom));z-index:11;
    width:124px;height:124px;border-radius:50%;border:2px solid #17130E;background:rgba(244,238,226,.5);
    box-shadow:3px 3px 0 #17130E;pointer-events:auto;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;display:none}
  .stick{position:absolute;left:50%;top:50%;width:56px;height:56px;margin:-28px 0 0 -28px;border-radius:50%;
    border:2px solid #17130E;background:#F2901C;box-shadow:2px 2px 0 #17130E;will-change:transform}
  .prompt{pointer-events:auto}
  @media (hover:none){.joy{display:block}.help{display:none}}
  .load{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:#7FC9EC;
    font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.18em;color:#0e2230}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui top">
  <span class="badge">neko<b>SHARK</b> · 破浪</span>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
    <a class="back" href="index.html">← 回主站</a>
    <div class="help">↑ 前进 · ← → 转向 · ↓ 后退<br>靠近浮标按 ENTER 进入</div>
  </div>
</div>
<div class="ui prompt" id="prompt">靠近了 <b id="promptName"></b> · 按 ENTER 进入</div>
<div class="joy" id="joy"><div class="stick" id="stick"></div></div>
<div class="load" id="load">起航中…  LOADING</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.7.4/umd/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
<script>
(function(){
  "use strict";
  if(typeof THREE==='undefined'){document.getElementById('load').textContent='Three.js 加载失败,请检查网络';return;}
  const INK=0x14110c, ORANGE=0xF2901C, SKY=0x7FC9EC, NAVY=0x232844, CREAM=0xF4EEE2;

  const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;

  const scene=new THREE.Scene();
  scene.background=new THREE.Color(SKY);
  scene.fog=new THREE.Fog(0x9ad5f0,70,180);

  const camera=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,0.1,500);

  scene.add(new THREE.HemisphereLight(0xdff3ff,0x1d4a63,0.9));
  const sun=new THREE.DirectionalLight(0xfff3df,1.15);
  sun.position.set(-30,50,-10); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048);
  const sc=sun.shadow.camera; sc.left=sc.bottom=-60; sc.right=sc.top=60; sc.near=1; sc.far=160; scene.add(sun);
  // sun disc in the sky
  const sunDisc=new THREE.Mesh(new THREE.CircleGeometry(14,40),new THREE.MeshBasicMaterial({color:0xffe7b0}));
  sunDisc.position.set(-70,46,-130); scene.add(sunDisc);

  // ===== ocean (animated low-poly) =====
  const SEG=120, SIZE=360;
  const oceanGeo=new THREE.PlaneGeometry(SIZE,SIZE,SEG,SEG);
  oceanGeo.rotateX(-Math.PI/2);
  const oceanMat=new THREE.MeshStandardMaterial({color:0x1f6f93,roughness:.55,metalness:.15,flatShading:true});
  const ocean=new THREE.Mesh(oceanGeo,oceanMat); ocean.receiveShadow=true; scene.add(ocean);
  const pos=oceanGeo.attributes.position;
  const baseXZ=[]; for(let i=0;i<pos.count;i++){ baseXZ.push(pos.getX(i),pos.getZ(i)); }
  function waveH(x,z,t){
    return Math.sin(x*0.16 + t*1.1)*0.85
         + Math.sin(z*0.21 + t*0.95)*0.62
         + Math.sin((x+z)*0.11 + t*1.5)*0.5
         + Math.sin((x-z)*0.27 + t*1.8)*0.22;
  }

  // ===== the surfer: the 3D logo itself rides the waves =====
  const creature=new THREE.Group(); scene.add(creature);
  let logo=null;
  new THREE.FBXLoader().load('assets/logo.fbx',function(obj){
    // keep the FBX's own ZBrush polypaint (vertex colours); just brighten the
    // base colour so the paint reads at full saturation, and cast shadows
    obj.traverse(function(ch){ if(ch.isMesh){ ch.castShadow=true;
      const mats=Array.isArray(ch.material)?ch.material:[ch.material];
      mats.forEach(function(m){ m.vertexColors=true; if(m.color) m.color.setHex(0xffffff); m.needsUpdate=true; }); }});
    // FBXLoader already brings it in Y-up; just measure as-is
    obj.updateMatrixWorld(true);
    // normalise: center on origin, scale to ~5.8 units tall
    const box=new THREE.Box3().setFromObject(obj);
    const size=new THREE.Vector3(); box.getSize(size);
    const center=new THREE.Vector3(); box.getCenter(center);
    const s=5.8/Math.max(size.y,0.001); obj.scale.setScalar(s);
    obj.position.set(-center.x*s,-center.y*s,-center.z*s);
    // pivot sits at the waterline where the fin used to be; faces the chase camera
    const pivot=new THREE.Group(); pivot.add(obj);
    pivot.position.set(0,2.9,0); pivot.rotation.y=Math.PI;
    creature.add(pivot); logo=pivot;
  },undefined,function(err){ document.getElementById('load').textContent='logo.fbx 加载失败'; });
  // wake: foam trail behind + foam ring at base
  const wakeMat=new THREE.MeshBasicMaterial({color:CREAM,transparent:true,opacity:.32,depthWrite:false});
  const wake=new THREE.Mesh(new THREE.PlaneGeometry(3.4,16),wakeMat);
  wake.rotation.x=-Math.PI/2; scene.add(wake);
  const ringMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.5,depthWrite:false});
  const ring=new THREE.Mesh(new THREE.RingGeometry(0.7,1.7,24),ringMat);
  ring.rotation.x=-Math.PI/2; scene.add(ring);
  // spray particles
  const SPN=90; const sprayGeo=new THREE.BufferGeometry();
  const sp=new Float32Array(SPN*3), spv=[];
  for(let i=0;i<SPN;i++){ sp[i*3]=0;sp[i*3+1]=-99;sp[i*3+2]=0; spv.push({life:0}); }
  sprayGeo.setAttribute('position',new THREE.BufferAttribute(sp,3));
  const spray=new THREE.Points(sprayGeo,new THREE.PointsMaterial({color:0xffffff,size:0.5,transparent:true,opacity:.9,depthWrite:false}));
  scene.add(spray);

  // ===== pixel fish that breach the waves =====
  function fishTex(body){var c=document.createElement('canvas');c.width=20;c.height=12;var x=c.getContext('2d');
    x.fillStyle=body; x.fillRect(4,4,11,5); x.fillRect(0,3,4,2); x.fillRect(0,7,4,2); x.fillRect(1,5,2,2);
    x.fillStyle='#0e2230'; x.fillRect(12,5,1,1);
    var tx=new THREE.CanvasTexture(c); tx.magFilter=THREE.NearestFilter; tx.minFilter=THREE.NearestFilter; return tx;}
  const fishCols=['#F2901C','#7FC9EC','#F4EEE2','#ffd29a'];
  const fishes=[];
  for(let fi=0;fi<9;fi++){
    const fspr=new THREE.Sprite(new THREE.SpriteMaterial({map:fishTex(fishCols[fi%4]),transparent:true}));
    fspr.scale.set(1.9,1.15,1); fspr.position.set(0,-99,0); scene.add(fspr);
    fishes.push({spr:fspr,active:false,wait:Math.random()*3.5,vx:0,vy:0,vz:0});
  }

  // ===== buoys (link back to site) =====
  function sign(label){const cv=document.createElement('canvas');cv.width=512;cv.height=256;const x=cv.getContext('2d');
    x.fillStyle='#F4EEE2';x.fillRect(0,0,512,256);x.strokeStyle='#17130E';x.lineWidth=14;x.strokeRect(7,7,498,242);
    x.fillStyle='#17130E';x.textAlign='center';x.textBaseline='middle';x.font='bold 120px "Space Grotesk",sans-serif';x.fillText(label,256,140);
    return new THREE.CanvasTexture(cv);}
  const BUOYS=[{label:'人偶',href:'index.html#figures',x:-30,z:-26},{label:'故事',href:'index.html#story',x:34,z:-30},
    {label:'工艺',href:'index.html#flow',x:-40,z:18},{label:'预约',href:'index.html#join',x:30,z:26}];
  const buoyG=[];
  BUOYS.forEach(b=>{const g=new THREE.Group();
    const float=new THREE.Mesh(new THREE.SphereGeometry(1.1,16,12),new THREE.MeshStandardMaterial({color:ORANGE,roughness:.6}));
    float.castShadow=true;
    const mast=new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,4),new THREE.MeshStandardMaterial({color:INK}));
    mast.position.y=2.4;
    const panel=new THREE.Mesh(new THREE.PlaneGeometry(4,2),new THREE.MeshBasicMaterial({map:sign(b.label),side:THREE.DoubleSide}));
    panel.position.y=4.6;
    g.add(float);g.add(mast);g.add(panel); g.position.set(b.x,0,b.z); g.userData=b; g.userData.panel=panel; scene.add(g); buoyG.push(g);});

  // ===== controls =====
  const keys={}; const map={ArrowUp:'f',KeyW:'f',ArrowDown:'b',KeyS:'b',ArrowLeft:'l',KeyA:'l',ArrowRight:'r',KeyD:'r'};
  let nearBuoy=null;
  addEventListener('keydown',e=>{ if(map[e.code]){keys[map[e.code]]=true; if(e.code.indexOf('Arrow')===0)e.preventDefault();}
    if(e.code==='Enter'&&nearBuoy)location.href=nearBuoy.userData.href; });
  addEventListener('keyup',e=>{ if(map[e.code])keys[map[e.code]]=false; });
  // mobile virtual joystick: analog steer (x) + throttle (y)
  let jx=0, jy=0;
  (function(){ const joy=document.getElementById('joy'), stick=document.getElementById('stick'); if(!joy) return;
    let pid=null, ox=0, oy=0; const R=44;
    function set(px,py){ let dx=px-ox, dy=py-oy; const d=Math.hypot(dx,dy);
      if(d>R){ dx=dx/d*R; dy=dy/d*R; } stick.style.transform='translate('+dx.toFixed(1)+'px,'+dy.toFixed(1)+'px)';
      jx=dx/R; jy=-dy/R; }
    function pick(e){ if(e.changedTouches){ for(const t of e.changedTouches){ if(t.identifier===pid) return t; } return null; } return e; }
    function down(e){ const r=joy.getBoundingClientRect(); ox=r.left+r.width/2; oy=r.top+r.height/2;
      pid=e.changedTouches?e.changedTouches[0].identifier:'m'; const p=e.changedTouches?e.changedTouches[0]:e;
      set(p.clientX,p.clientY); e.preventDefault(); }
    function move(e){ if(pid===null) return; const p=pick(e); if(!p) return; set(p.clientX,p.clientY); e.preventDefault(); }
    function up(){ pid=null; jx=0; jy=0; stick.style.transform='translate(0,0)'; }
    joy.addEventListener('touchstart',down,{passive:false}); joy.addEventListener('touchmove',move,{passive:false});
    joy.addEventListener('touchend',up); joy.addEventListener('touchcancel',up);
    joy.addEventListener('mousedown',down); addEventListener('mousemove',move); addEventListener('mouseup',up);
  })();
  // tap the proximity prompt to enter a buoy (mobile has no ENTER key)
  document.getElementById('prompt').addEventListener('click',()=>{ if(nearBuoy)location.href=nearBuoy.userData.href; });

  let speed=0, angle=0; const MAX=0.6, ACC=0.02, FR=0.94, TURN=0.034;
  // fixed-angle follow camera: constant world-space offset, pulled back (Bruno-Simon style)
  const CAM_OFF=new THREE.Vector3(7,20,-32);
  const camPos=new THREE.Vector3().copy(CAM_OFF), tmp=new THREE.Vector3();
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  document.getElementById('load').style.display='none';

  const prompt=document.getElementById('prompt'), promptName=document.getElementById('promptName');
  const clock=new THREE.Clock();

  function frame(){
    const t=clock.getElapsedTime();
    // ocean waves
    for(let i=0;i<pos.count;i++){ pos.setY(i, waveH(baseXZ[i*2],baseXZ[i*2+1],t)); }
    pos.needsUpdate=true; oceanGeo.computeVertexNormals();

    // throttle from keys or joystick Y (analog); coasts to a stop otherwise
    const thr=(keys.f?1:0)-(keys.b?1:0)+jy;
    if(thr>0.05) speed+=ACC*Math.min(1,thr); else if(thr<-0.05) speed-=ACC*0.8*Math.min(1,-thr);
    speed*=FR;
    speed=Math.max(-MAX*0.45, Math.min(MAX,speed));
    if(Math.abs(speed)<0.0015) speed=0;
    const steer=(keys.l?1:0)-(keys.r?1:0)-jx*1.1;
    angle += steer*TURN;
    const fx=Math.sin(angle), fz=Math.cos(angle);
    creature.position.x += fx*speed; creature.position.z += fz*speed;
    const r=Math.hypot(creature.position.x,creature.position.z); if(r>120){creature.position.x*=120/r;creature.position.z*=120/r;}
    // ride the waves: height + bob + slight roll from wave slope
    const cx=creature.position.x, cz=creature.position.z;
    const hC=waveH(cx,cz,t), hF=waveH(cx+fx,cz+fz,t);
    creature.position.y=hC;
    creature.rotation.y=angle;
    creature.rotation.x=(hF-hC)*0.5;
    creature.rotation.z=Math.sin(t*1.3)*0.04;

    // wake follows behind
    const wsp=Math.min(1,Math.abs(speed)/0.3);
    wake.position.set(cx-fx*8, hC+0.06, cz-fz*8); wake.rotation.z=0; wake.rotation.y=angle; wakeMat.opacity=0.32*wsp;
    ring.position.set(cx, hC+0.05, cz); const rp=1+Math.sin(t*5)*0.12; ring.scale.set(rp,rp,rp); ringMat.opacity=0.5*wsp;

    // spray at the fin tip
    const apos=sprayGeo.attributes.position;
    for(let i=0;i<SPN;i++){ const p=spv[i];
      if(p.life<=0){ if(speed>0.2 && Math.random()<0.5){ p.life=0.6+Math.random()*0.4;
          p.x=cx+(Math.random()-.5)*1.4; p.y=hC+0.6; p.z=cz+(Math.random()-.5)*1.4;
          p.vx=fx*0.2+(Math.random()-.5)*0.18; p.vy=0.18+Math.random()*0.16; p.vz=fz*0.2+(Math.random()-.5)*0.18;
        } else { apos.setXYZ(i,0,-99,0); continue; } }
      p.life-=0.016; p.vy-=0.018; p.x+=p.vx; p.y+=p.vy; p.z+=p.vz;
      apos.setXYZ(i, p.life>0?p.x:0, p.life>0?p.y:-99, p.life>0?p.z:0);
    }
    apos.needsUpdate=true;

    // pixel fish leaping out of the waves
    fishes.forEach(function(f){
      if(!f.active){ f.wait-=0.016; if(f.wait<=0){
          const ang=Math.random()*6.283, dist=9+Math.random()*24;
          const fxp=cx+Math.sin(ang)*dist, fzp=cz+Math.cos(ang)*dist;
          f.spr.position.set(fxp, waveH(fxp,fzp,t)-0.4, fzp);
          const dir=Math.random()*6.283, hs=0.06+Math.random()*0.08;
          f.vx=Math.cos(dir)*hs; f.vz=Math.sin(dir)*hs; f.vy=0.3+Math.random()*0.18; f.active=true;
        } return; }
      f.vy-=0.018; f.spr.position.x+=f.vx; f.spr.position.y+=f.vy; f.spr.position.z+=f.vz;
      f.spr.material.rotation=Math.atan2(f.vy,Math.max(0.05,Math.hypot(f.vx,f.vz)));
      if(f.vy<0 && f.spr.position.y < waveH(f.spr.position.x,f.spr.position.z,t)-0.4){
        f.spr.position.set(0,-99,0); f.active=false; f.wait=0.5+Math.random()*3.5;
      }
    });

    // buoys bob + billboard + proximity
    nearBuoy=null;
    buoyG.forEach(g=>{ g.position.y=waveH(g.position.x,g.position.z,t);
      g.userData.panel.lookAt(camera.position.x,g.userData.panel.getWorldPosition(tmp).y,camera.position.z);
      const d=Math.hypot(g.position.x-cx,g.position.z-cz); if(d<7&&(!nearBuoy||d<nearBuoy._d)){nearBuoy=g;nearBuoy._d=d;} });
    if(nearBuoy){promptName.textContent=nearBuoy.userData.label;prompt.classList.add('on');}else prompt.classList.remove('on');

    // (logo rides upright with the creature group; no extra spin)

    // fixed-angle follow camera: stays on the same world side & height no matter how
    // you steer (no more view-swing), just glides to keep the surfer framed, pulled back
    tmp.set(cx + CAM_OFF.x, CAM_OFF.y, cz + CAM_OFF.z);
    camPos.lerp(tmp,0.08); camera.position.copy(camPos);
    camera.lookAt(cx, 2.4, cz);

    renderer.render(scene,camera);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
