<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>nekoSHARK · 猫鲨岛</title>
<meta name="description" content="开着猫鲨小车环岛兜风:撞字母、打保龄、推球进门、跳台飞跃、收小鱼干。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F4EEE2; --cream2:#EADFCC; --ink:#17130E; --orange:#F2901C; --orange2:#ffd29a; --sky:#7FC9EC;
    --pix:"Press Start 2P",monospace; --term:"VT323",monospace; --cn:"ZCOOL KuaiLe","PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#7FC9EC;font-family:var(--term);color:var(--ink)}
  #c{position:fixed;inset:0;display:block;touch-action:none}
  button{font:inherit;cursor:pointer}

  /* ===== HUD ===== */
  .ui{position:fixed;z-index:10;pointer-events:none}
  .top{top:max(14px,env(safe-area-inset-top));left:16px;right:16px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .badges{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
  .badge{font-family:var(--pix);font-size:10px;letter-spacing:.12em;background:var(--ink);color:var(--cream);padding:9px 12px;border-radius:8px;border:2px solid var(--ink)}
  .badge b{color:var(--orange)}
  .chip{font-family:var(--term);font-size:19px;letter-spacing:.06em;background:rgba(255,251,243,.9);border:2px solid var(--ink);
    box-shadow:3px 3px 0 var(--ink);padding:4px 10px;border-radius:8px}
  .chip b{color:var(--orange)}
  .btncol{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .hbtn{pointer-events:auto;font-family:var(--pix);font-size:9px;letter-spacing:.08em;
    background:var(--cream);color:var(--ink);border:2px solid var(--ink);box-shadow:3px 3px 0 var(--ink);
    padding:8px 11px;border-radius:6px;transition:.1s}
  .hbtn:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--ink)}
  .hbtn.main{background:var(--orange)}
  .help{position:fixed;right:16px;bottom:calc(14px + env(safe-area-inset-bottom));text-align:right;
    font-family:var(--term);font-size:18px;line-height:1.55;color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,.55)}
  .spd{font-family:var(--pix);font-size:10px;margin-bottom:6px;color:var(--ink)}
  .spd b{color:var(--orange);font-size:13px}

  /* prompt near a billboard */
  .prompt{left:50%;bottom:calc(118px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);
    font-family:var(--term);font-size:22px;background:rgba(23,19,14,.92);color:var(--cream);padding:10px 18px;border-radius:10px;
    opacity:0;transition:.18s;pointer-events:none}
  .prompt.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;cursor:pointer}
  .prompt b{color:var(--orange)}

  /* toast */
  .toast{left:50%;top:calc(76px + env(safe-area-inset-top));transform:translateX(-50%) scale(.9);
    font-family:var(--cn);font-size:26px;letter-spacing:.04em;background:var(--cream);border:2px solid var(--ink);
    box-shadow:4px 4px 0 var(--ink);color:var(--ink);padding:10px 20px;border-radius:10px;opacity:0;transition:.22s cubic-bezier(.22,1,.36,1)}
  .toast.on{opacity:1;transform:translateX(-50%) scale(1)}
  .toast b{color:var(--orange)}

  /* ===== mobile controls ===== */
  .joy{position:fixed;left:max(20px,env(safe-area-inset-left));bottom:calc(24px + env(safe-area-inset-bottom));z-index:11;
    width:128px;height:128px;border-radius:50%;border:2px solid var(--ink);background:rgba(244,238,226,.55);
    box-shadow:3px 3px 0 var(--ink);pointer-events:auto;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;display:none}
  .stick{position:absolute;left:50%;top:50%;width:58px;height:58px;margin:-29px 0 0 -29px;border-radius:50%;
    border:2px solid var(--ink);background:var(--orange);box-shadow:2px 2px 0 var(--ink);will-change:transform}
  .mbtns{position:fixed;right:max(20px,env(safe-area-inset-right));bottom:calc(24px + env(safe-area-inset-bottom));z-index:11;
    display:none;flex-direction:column;gap:12px;align-items:center}
  .mb{width:62px;height:62px;border-radius:50%;border:2px solid var(--ink);box-shadow:3px 3px 0 var(--ink);
    font-family:var(--cn);font-size:20px;color:var(--ink);background:rgba(244,238,226,.85);
    touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
  .mb:active{transform:translate(2px,2px);box-shadow:0 0 0 var(--ink)}
  .mb.meow{background:var(--orange)}
  .mb.small{width:48px;height:48px;font-size:15px}
  @media (hover:none){.joy{display:block}.mbtns{display:flex}.help{display:none}}

  /* ===== overlay: loading + start ===== */
  .ov{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 90% at 50% 0%, #fff7ea 0%, var(--cream) 46%, var(--cream2) 100%);padding:18px;
    transition:opacity .35s}
  .ov.off{opacity:0;pointer-events:none}
  .win{width:min(480px,94vw);border:2px solid var(--ink);border-radius:8px;background:#fffbf3;
    box-shadow:7px 7px 0 var(--ink);overflow:hidden}
  .win .bar{display:flex;align-items:center;gap:7px;padding:8px 11px;background:var(--ink);
    font-family:var(--pix);font-size:8px;color:var(--cream)}
  .win .bar i{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--cream)}
  .win .bar .r{background:#ff6b8b}.win .bar .y{background:var(--orange)}.win .bar .g{background:var(--sky)}
  .win .bar span{margin-left:auto;opacity:.8}
  .win .body{padding:24px 22px 22px;text-align:center}
  .ttl{font-family:var(--cn);font-size:44px;line-height:1.1;letter-spacing:2px;
    text-shadow:3px 3px 0 var(--orange2)}
  .sub{font-family:var(--term);font-size:22px;color:#5c5346;margin-top:6px}
  .bar-wrap{margin:26px auto 8px;width:82%;height:18px;border:2px solid var(--ink);border-radius:6px;background:var(--cream);overflow:hidden}
  .bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--orange),var(--orange2));transition:width .25s}
  .loadtxt{font-family:var(--pix);font-size:8px;letter-spacing:.18em;color:#5c5346;margin-bottom:6px}
  .ctl{display:flex;gap:10px;justify-content:center;margin:20px 0 4px;flex-wrap:wrap}
  .key{font-family:var(--term);font-size:19px;background:var(--cream);border:2px solid var(--ink);
    box-shadow:2px 2px 0 var(--ink);border-radius:6px;padding:5px 10px}
  .key b{color:var(--orange)}
  .go{display:none;margin:22px auto 4px;font-family:var(--pix);font-size:12px;padding:15px 26px;
    border:2px solid var(--ink);background:var(--orange);color:var(--ink);box-shadow:4px 4px 0 var(--ink);border-radius:8px;transition:.1s}
  .go:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}
  .tip{font-family:var(--term);font-size:18px;color:#5c5346;margin-top:14px}
  .tip b{color:var(--orange)}
  .err{display:none;font-family:var(--term);font-size:20px;color:#a33;margin-top:12px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="ui top">
  <div class="badges">
    <span class="badge">neko<b>SHARK</b> · 猫鲨岛</span>
    <span class="chip">小鱼干 <b id="fishN">0</b> / <span id="fishT">12</span></span>
  </div>
  <div class="btncol">
    <a class="hbtn main" href="index.html" style="text-decoration:none">← 回主站</a>
    <button class="hbtn" id="sndBtn">音效 开</button>
    <button class="hbtn" id="rstBtn">复位小车</button>
  </div>
</div>

<div class="ui help" id="help">
  <div class="spd"><b id="spdN">0</b> km/h</div>
  WASD / 方向键 开车 · 空格 漂移<br>H 喵一声 · R 复位 · 滚轮 缩放
</div>

<div class="ui prompt" id="prompt">去 <b id="promptName"></b> 看看 · 按 ENTER 或点这里</div>
<div class="ui toast" id="toast"></div>

<div class="joy" id="joy"><div class="stick" id="stick"></div></div>
<div class="mbtns" id="mbtns">
  <button class="mb small" id="mbR">复位</button>
  <button class="mb" id="mbDrift">漂移</button>
  <button class="mb meow" id="mbMeow">喵!</button>
</div>

<div class="ov" id="ov">
  <div class="win">
    <div class="bar"><i class="r"></i><i class="y"></i><i class="g"></i><span>nekoSHARK.exe</span></div>
    <div class="body">
      <div class="ttl">猫鲨岛</div>
      <div class="sub">一座可以开车乱撞的小岛</div>
      <div class="loadtxt" id="loadtxt">LOADING</div>
      <div class="bar-wrap"><div class="bar-fill" id="barFill"></div></div>
      <div class="ctl" id="ctlKeys">
        <span class="key"><b>WASD</b> 开车</span><span class="key"><b>空格</b> 漂移</span>
        <span class="key"><b>H</b> 喵</span><span class="key"><b>ENTER</b> 进展牌</span>
      </div>
      <button class="go" id="go">上岛兜风</button>
      <div class="tip">撞翻字母 · 打保龄 · 推球进门 · 收齐 <b>12</b> 条小鱼干</div>
      <div class="err" id="err">加载失败了,刷新一下试试。</div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

/* ============================================================
   nekoSHARK 猫鲨岛 · 开车游乐场
   物理: cannon-es RaycastVehicle / 画面: three.js 低多边形
   ============================================================ */
const INK=0x17130E, ORANGE=0xF2901C, ORANGE2=0xffd29a, SKY=0x7FC9EC, CREAM=0xF4EEE2, CREAM2=0xEADFCC;
const OCEAN=0x1f6f93, SAND=0xE7D8B4;
const MOBILE = matchMedia('(hover:none)').matches || innerWidth < 820;
const ISLAND_R = 88;          // 岛半径(世界单位)
const WATER_R  = 87;          // 超出即落水
const SPAWN = new CANNON.Vec3(0, 1.8, -40);

const $=id=>document.getElementById(id);
const barFill=$('barFill'), loadtxt=$('loadtxt');
let progress=0; function setProg(p){ progress=Math.max(progress,p); barFill.style.width=(progress*100).toFixed(0)+'%'; }
let booted=false;
setTimeout(()=>{ if(!booted){ $('err').style.display='block'; loadtxt.textContent='TIMEOUT'; } }, 20000);

/* ---------- renderer / scene / camera ---------- */
const renderer=new THREE.WebGLRenderer({canvas:$('c'),antialias:!MOBILE});
renderer.setPixelRatio(Math.min(devicePixelRatio, MOBILE?1:2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=MOBILE?THREE.PCFShadowMap:THREE.PCFSoftShadowMap;

const scene=new THREE.Scene();
scene.background=new THREE.Color(SKY);
scene.fog=new THREE.Fog(0x9ad5f0, 100, 300);
const camera=new THREE.PerspectiveCamera(56, innerWidth/innerHeight, 0.1, 600);

scene.add(new THREE.HemisphereLight(0xfff6e5, 0x9a8f75, 0.85));
const sun=new THREE.DirectionalLight(0xfff3df, 1.6);
sun.castShadow=true;
sun.shadow.mapSize.set(MOBILE?1024:2048, MOBILE?1024:2048);
const sc=sun.shadow.camera; sc.left=sc.bottom=-60; sc.right=sc.top=60; sc.near=5; sc.far=180;
scene.add(sun); scene.add(sun.target);
const sunDisc=new THREE.Mesh(new THREE.CircleGeometry(16,40), new THREE.MeshBasicMaterial({color:0xffe7b0,fog:false}));
sunDisc.position.set(-140,90,-260); scene.add(sunDisc);
setProg(0.08);

/* ---------- physics world ---------- */
const world=new CANNON.World({gravity:new CANNON.Vec3(0,-20,0)});
world.broadphase=new CANNON.SAPBroadphase(world);
world.allowSleep=true;
world.defaultContactMaterial.friction=0.35;
world.defaultContactMaterial.restitution=0.12;
const groundMat=new CANNON.Material('ground');
const ballMat=new CANNON.Material('ball');
world.addContactMaterial(new CANNON.ContactMaterial(groundMat, ballMat, {friction:0.25, restitution:0.6}));

const groundBody=new CANNON.Body({mass:0, material:groundMat, shape:new CANNON.Plane()});
groundBody.quaternion.setFromEuler(-Math.PI/2,0,0);
world.addBody(groundBody);

/* ---------- helpers ---------- */
const texLoader=new THREE.TextureLoader();
function canvasTex(w,h,draw){
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  draw(cv.getContext('2d'), cv);
  const t=new THREE.CanvasTexture(cv); t.colorSpace=THREE.SRGBColorSpace; return t;
}
function mat(color,extra){ return new THREE.MeshStandardMaterial(Object.assign({color,roughness:.85,metalness:0},extra||{})); }
const propsSync=[];   // {mesh, body, home:{p,q}, kind}
function trackProp(mesh, body, kind){
  propsSync.push({mesh, body, kind,
    home:{p:body.position.clone(), q:body.quaternion.clone()}});
}
function resetProp(s){
  s.body.position.copy(s.home.p); s.body.quaternion.copy(s.home.q);
  s.body.velocity.setZero(); s.body.angularVelocity.setZero(); s.body.sleep();
  s.body.updateAABB();   // 休眠体不参与积分,AABB 必须手动刷新,否则变"幽灵"
}

/* ---------- 地面画布(暖白画布 + 墨线) ---------- */
const GS=2048, PXU=GS/(ISLAND_R*2);
const gx=x=>GS/2+x*PXU, gz=z=>GS/2+z*PXU;
let groundCtx=null, groundTex=null;
function paintGround(){
  groundTex=canvasTex(GS,GS,(x)=>{
    groundCtx=x;
    x.fillStyle='#F4EEE2'; x.fillRect(0,0,GS,GS);
    // 沙滩外环
    x.strokeStyle='#EADFCC'; x.lineWidth=(ISLAND_R-81)*PXU;
    x.beginPath(); x.arc(GS/2,GS/2,84.5*PXU,0,7); x.stroke();
    x.setLineDash([26,20]); x.strokeStyle='rgba(23,19,14,.5)'; x.lineWidth=5;
    x.beginPath(); x.arc(GS/2,GS/2,81*PXU,0,7); x.stroke(); x.setLineDash([]);

    const ink='rgba(23,19,14,.9)', soft='rgba(23,19,14,.42)';
    function road(pts,dash){ x.setLineDash(dash||[34,26]); x.strokeStyle=soft; x.lineWidth=7; x.beginPath();
      x.moveTo(gx(pts[0][0]),gz(pts[0][1])); for(let i=1;i<pts.length;i++)x.lineTo(gx(pts[i][0]),gz(pts[i][1])); x.stroke(); x.setLineDash([]); }
    function label(wx,wz,str,sizeU,ang,color,font){
      x.save(); x.translate(gx(wx),gz(wz)); x.rotate(Math.PI+(ang||0));
      x.fillStyle=color||ink; x.textAlign='center'; x.textBaseline='middle';
      x.font=(sizeU*PXU)+'px '+(font||'"ZCOOL KuaiLe"'); x.fillText(str,0,0); x.restore();
    }
    function arrow(wx,wz,ang,len){ x.save(); x.translate(gx(wx),gz(wz)); x.rotate(Math.PI+ang);
      x.strokeStyle=soft; x.lineWidth=8; x.beginPath(); x.moveTo(0,len*PXU/2); x.lineTo(0,-len*PXU/2);
      x.moveTo(-14,-len*PXU/2+18); x.lineTo(0,-len*PXU/2); x.lineTo(14,-len*PXU/2+18); x.stroke(); x.restore(); }
    function ring(wx,wz,rU,w,color){ x.strokeStyle=color||ink; x.lineWidth=w; x.beginPath(); x.arc(gx(wx),gz(wz),rU*PXU,0,7); x.stroke(); }
    function pad(wx,wz,txt){ x.fillStyle='rgba(242,144,28,.85)'; x.beginPath(); x.arc(gx(wx),gz(wz),3.1*PXU,0,7); x.fill();
      ring(wx,wz,3.1,6,'rgba(23,19,14,.9)'); if(txt) label(wx,wz,txt,1.7,0,'#17130E'); }

    // 道路
    road([[0,-40],[0,-26]]);            // 起点 → 字母
    road([[0,-18],[0,4],[0,12]]);       // 字母 → 跳台
    road([[3,-6],[20,-6],[42,-6]]);     // → 展馆街
    road([[-3,-6],[-20,-6],[-30,-6]]);  // → 游乐场
    // 起点框
    x.strokeStyle=ink; x.lineWidth=6; x.strokeRect(gx(-3.2),gz(-44),6.4*PXU,7*PXU);
    label(0,-46.8,'起点 START',2.2);
    arrow(0,-33,0,7);
    label(0,-30,'↑ 油门 · ←→ 转向',2.0,0,soft);
    // 中心雕像环
    ring(0,-12,5.2,7); ring(0,-12,6.2,4,'rgba(242,144,28,.8)');
    // 区域名
    label(24,-9.4,'展馆街 →',2.6,0,soft);
    label(-22,-9.4,'← 游乐场',2.6,0,soft);
    label(7,14,'跳台 ↑',2.4,0,soft);
    // 保龄球道
    x.strokeStyle=ink; x.lineWidth=6; x.strokeRect(gx(-54),gz(-17),26*PXU,6*PXU);
    label(-33,-19.5,'保龄球道',2.2,0,soft);
    for(let r=0;r<4;r++)for(let i=0;i<=r;i++){
      const px=-49.5-r*1.05, pz=-14+(i-r/2)*1.1;
      x.fillStyle='rgba(23,19,14,.25)'; x.beginPath(); x.arc(gx(px),gz(pz),.32*PXU,0,7); x.fill();
    }
    // 球场
    x.strokeStyle=ink; x.lineWidth=6; x.strokeRect(gx(-53),gz(22),24*PXU,16*PXU);
    x.lineWidth=10; x.beginPath(); x.moveTo(gx(-52),gz(25.5)); x.lineTo(gx(-52),gz(34.5)); x.stroke();
    ring(-40,30,2.6,5,soft); label(-36,20,'推球进门!',2.2,0,soft);
    // 跳台落点
    for(let i=0;i<4;i++){ x.strokeStyle='rgba(23,19,14,.4)'; x.lineWidth=5;
      x.beginPath(); x.moveTo(gx(-3),gz(31+i*4)); x.lineTo(gx(3),gz(31+i*4)); x.stroke();
      label(5,31+i*4,(6+i*4)+'m',1.5,0,soft);
    }
    // 漂移圈
    ring(26,38,6,6,'rgba(23,19,14,.45)'); ring(26,38,10,5,'rgba(23,19,14,.3)');
    label(26,38,'漂移圈',2.2,0,soft);
    // 互动垫
    pad(-36,-2); label(-36,2.2,'重摆玩具',1.9,0,ink);
    // 加速带箭头
    [[0,8,0],[36,-6,Math.PI/2],[-14,26,-Math.PI/2]].forEach(b=>{
      x.save(); x.translate(gx(b[0]),gz(b[1])); x.rotate(Math.PI+b[2]);
      x.fillStyle='rgba(242,144,28,.9)';
      for(let k=0;k<2;k++){ x.beginPath();
        x.moveTo(-1.4*PXU, (1.4-k*1.6)*PXU); x.lineTo(0,(0.2-k*1.6)*PXU); x.lineTo(1.4*PXU,(1.4-k*1.6)*PXU);
        x.lineTo(1.4*PXU,(0.7-k*1.6)*PXU); x.lineTo(0,(-0.5-k*1.6)*PXU); x.lineTo(-1.4*PXU,(0.7-k*1.6)*PXU);
        x.closePath(); x.fill(); }
      x.restore();
    });
    // 展牌停车位
    [[-27,'人偶'],[-9,'故事'],[9,'工艺'],[27,'预约']].forEach(b=>{
      x.strokeStyle=ink; x.lineWidth=5; x.strokeRect(gx(43),gz(b[0]-3),6*PXU,6*PXU);
      label(46,b[0]+4.6,b[1],2.0,0,soft);
    });
    // 猫爪印小路(彩蛋装饰)
    function paw(wx,wz,s,ang){ x.save(); x.translate(gx(wx),gz(wz)); x.rotate(ang);
      x.fillStyle='rgba(23,19,14,.28)';
      x.beginPath(); x.ellipse(0,0,.5*s*PXU,.4*s*PXU,0,0,7); x.fill();
      [[-.45,-.55],[0,-.7],[.45,-.55]].forEach(t=>{ x.beginPath();
        x.ellipse(t[0]*s*PXU,t[1]*s*PXU,.16*s*PXU,.2*s*PXU,0,0,7); x.fill(); });
      x.restore(); }
    for(let i=0;i<9;i++) paw(14+Math.sin(i*1.1)*2.2, -34+i*4.5, .9, Math.sin(i)*0.5);
    for(let i=0;i<7;i++) paw(-52+i*3.4, 46-i*1.4, .9, 1.6+Math.sin(i)*0.4);
    // 海星
    function star(wx,wz,s,color){ x.save(); x.translate(gx(wx),gz(wz)); x.fillStyle=color;

function makePool(n,size,opacity){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(n*3), col=new Float32Array(n*3);
  for(let i=0;i<n;i++){ pos[i*3+1]=-999; col[i*3]=1; col[i*3+1]=1; col[i*3+2]=1; }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({size,vertexColors:true,transparent:true,opacity,depthWrite:false}));
  scene.add(pts);
  return {geo,data:Array.from({length:n},()=>({life:0,x:0,y:0,z:0,vx:0,vy:0,vz:0})),cursor:0,n};
}
const confetti=makePool(MOBILE?140:240,0.36,0.95);
const puffs=makePool(MOBILE?90:150,0.5,0.7);
const PALETTE=[ORANGE,SKY,CREAM,0xff6b8b,ORANGE2];
function spawnParticle(pool,x,y,z,vx,vy,vz,life,color){
  const i=pool.cursor; pool.cursor=(pool.cursor+1)%pool.n;
  const d=pool.data[i]; d.life=life; d.x=x; d.y=y; d.z=z; d.vx=vx; d.vy=vy; d.vz=vz;
  const c=new THREE.Color(color);
  pool.geo.attributes.color.setXYZ(i,c.r,c.g,c.b);
}
function burst(x,y,z,n,colors){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, r=Math.random()*0.5;
    spawnParticle(confetti,x+Math.cos(a)*r,y,z+Math.sin(a)*r,
      Math.cos(a)*(2+Math.random()*4), 5+Math.random()*6, Math.sin(a)*(2+Math.random()*4),
      1.1+Math.random()*0.7, colors[i%colors.length]);
  }
}
function puff(x,y,z,n,spread,up,color){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    spawnParticle(puffs,x,y,z,
      Math.cos(a)*spread*(0.4+Math.random()), up*(0.5+Math.random()), Math.sin(a)*spread*(0.4+Math.random()),
      0.5+Math.random()*0.4, color||0xffffff);
  }
}
function updatePool(pool,dt,grav){
  const p=pool.geo.attributes.position;
  for(let i=0;i<pool.n;i++){
    const d=pool.data[i];
    if(d.life<=0){ if(p.getY(i)>-500) p.setXYZ(i,0,-999,0); continue; }
    d.life-=dt; d.vy-=grav*dt; d.x+=d.vx*dt; d.y+=d.vy*dt; d.z+=d.vz*dt;
    if(d.y<0.1&&d.vy<0){ d.vy*=-0.3; d.y=0.1; d.vx*=0.7; d.vz*=0.7; }
    p.setXYZ(i,d.x,d.y,d.z);
  }
  p.needsUpdate=true;
}

/* ---------- 声音 ---------- */
let AC=null, master=null, engOsc=null, engOsc2=null, engGain=null, skidSrc=null, skidGain=null, noiseBuf=null;
let soundOn=true, started=false;
const meows=[1,2,3].map(i=>{ const a=new Audio('assets/meow'+i+'.mp3'); a.preload='auto'; a.volume=0.85; return a; });
function initAudio(){
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=0.9; master.connect(AC.destination);
    noiseBuf=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
    const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    // 引擎
    engOsc=AC.createOscillator(); engOsc.type='sawtooth'; engOsc.frequency.value=60;
    engOsc2=AC.createOscillator(); engOsc2.type='square'; engOsc2.frequency.value=30;
    engGain=AC.createGain(); engGain.gain.value=0;
    const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=520;
    engOsc.connect(engGain); engOsc2.connect(engGain); engGain.connect(lp); lp.connect(master);
    engOsc.start(); engOsc2.start();
    // 漂移沙沙声
    skidSrc=AC.createBufferSource(); skidSrc.buffer=noiseBuf; skidSrc.loop=true;
    skidGain=AC.createGain(); skidGain.gain.value=0;
    const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900;
    skidSrc.connect(bp); bp.connect(skidGain); skidGain.connect(master);
    skidSrc.start();
  }catch(e){ AC=null; }
}
function blip(freq,dur,type,vol,glide){
  if(!AC||!soundOn) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'square'; o.frequency.value=freq;
  if(glide) o.frequency.exponentialRampToValueAtTime(glide, AC.currentTime+dur);
  g.gain.value=vol||0.12; g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime+dur+0.02);
}
function chord(base){ blip(base,0.16,'square',0.1); setTimeout(()=>blip(base*1.335,0.16,'square',0.1),70); setTimeout(()=>blip(base*2,0.3,'square',0.12),140); }
let lastImpact=0;
function impactSound(v){
  if(!AC||!soundOn) return;
  const now=performance.now(); if(now-lastImpact<70) return; lastImpact=now;
  const s=AC.createBufferSource(); s.buffer=noiseBuf;
  const g=AC.createGain(); g.gain.value=Math.min(0.4,v*0.35);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.18);
  const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=300+v*500;
  s.connect(f); f.connect(g); g.connect(master); s.start(); s.stop(AC.currentTime+0.2);
}
function splashSound(){
  if(!AC||!soundOn) return;
  const s=AC.createBufferSource(); s.buffer=noiseBuf;
  const g=AC.createGain(); g.gain.value=0.3; g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.5);
  const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1200;
  f.frequency.exponentialRampToValueAtTime(180,AC.currentTime+0.5);
  s.connect(f); f.connect(g); g.connect(master); s.start(); s.stop(AC.currentTime+0.55);
}
let lastMeow=0;
function meow(){

(function(){
  const joy=$('joy'), stick=$('stick'); if(!joy) return;
  let pid=null, ox=0, oy=0; const R=46;
  function set(px,py){ let dx=px-ox, dy=py-oy; const d=Math.hypot(dx,dy);
    if(d>R){ dx=dx/d*R; dy=dy/d*R; }
    stick.style.transform='translate('+dx.toFixed(1)+'px,'+dy.toFixed(1)+'px)';
    jx=dx/R; jy=-dy/R; }
  function pick(e){ if(e.changedTouches){ for(const t of e.changedTouches) if(t.identifier===pid) return t; return null; } return e; }
  joy.addEventListener('touchstart',e=>{ const r=joy.getBoundingClientRect(); ox=r.left+r.width/2; oy=r.top+r.height/2;
    pid=e.changedTouches[0].identifier; set(e.changedTouches[0].clientX,e.changedTouches[0].clientY); e.preventDefault(); },{passive:false});
  joy.addEventListener('touchmove',e=>{ if(pid===null)return; const p=pick(e); if(!p)return; set(p.clientX,p.clientY); e.preventDefault(); },{passive:false});
  function up(){ pid=null; jx=0; jy=0; stick.style.transform='translate(0,0)'; }
  joy.addEventListener('touchend',up); joy.addEventListener('touchcancel',up);
})();

function carForward(out){

const clock=new THREE.Clock();
const camPos=new THREE.Vector3(SPAWN.x-11,14,SPAWN.z-16);
const camOff=new THREE.Vector3(-11,13.5,-15.5);
const lookAt=new THREE.Vector3();
let spdSmooth=0;

function gameplay(dt,t){
  const cx=chassisBody.position.x, cz=chassisBody.position.z;
  const spd=Math.abs(carSpeed());

  // 展牌接近提示
  nearLink=null;
  for(const p of linkPads){
    if(Math.hypot(p.x-cx,p.z-cz)<4.4){ nearLink=p; break; }
  }
  if(nearLink){ promptName.textContent=nearLink.label; promptEl.classList.add('on'); }
  else promptEl.classList.remove('on');

  // 重摆垫
  if(Math.hypot(-36-cx,-2-cz)<3.6 && t-resetPadLast>4){ resetPadLast=t; resetToys(); }

  // 加速带
  for(const b of boostPads){
    b.halo.material.opacity=0.18+Math.sin(t*5)*0.1;
    if(t-b.last>1.2 && Math.hypot(b.x-cx,b.z-cz)<2.8){
      b.last=t; boostUntil=t+1.2;
      carForward(fwdVec);
      chassisBody.applyImpulse(new CANNON.Vec3(fwdVec.x*CAR.mass*6,0,fwdVec.z*CAR.mass*6));
      blip(180,0.3,'sawtooth',0.16,720);
      for(let i=0;i<10;i++) puff(cx-fwdVec.x*2,0.4,cz-fwdVec.z*2,2,1.6,1.2,0xffffff);
    }
  }

  // 小鱼干
  for(const f of fishTokens){
    if(f.got) continue;
    f.mesh.rotation.y+=dt*2.4;
    f.mesh.position.y=f.y+Math.sin(t*2.2+f.ph)*0.16;
    const d3=Math.hypot(f.x-cx, f.z-cz), dy=Math.abs(f.mesh.position.y-(chassisBody.position.y));
    if(d3<2.3 && dy<2.6){
      f.got=true; fishGot++; $('fishN').textContent=fishGot;
      f.mesh.visible=false;
      blip(660,0.12,'square',0.14,990);
      burst(f.x,f.mesh.position.y,f.z,10,[ORANGE,SKY,CREAM]);
      if(fishGot===fishTokens.length){
        finUnlocked=true; finMesh.material.color.setHex(ORANGE);
        toast('<b>12 条小鱼干全收!</b>车鳍馋成橙色啦', 3600);
        burst(cx,2,cz,60,PALETTE); chord(523);
      }
    }
  }

  // 保龄球 STRIKE
  if(!strikeDone){
    let down=0;
    for(const p of pins){
      p.body.quaternion.vmult(tmpV.set(0,1,0),fwdVec);
      const moved=Math.hypot(p.body.position.x-p.home.p.x, p.body.position.z-p.home.p.z);
      if(fwdVec.y<0.45||moved>1.2) down++;
    }
    if(down===pins.length){
      strikeDone=true;
      toast('全倒!<b>STRIKE!</b>',3000);
      burst(-50,1.5,-14,50,PALETTE); chord(440);
    }
  }

  // 进球
  goalCooldown-=dt;
  if(ballBody && goalCooldown<=0){
    const bp=ballBody.position;
    if(bp.x<-52.4 && bp.x>-54.5 && Math.abs(bp.z-30)<4.4 && bp.y<2.6){
      goalCooldown=3;
      toast('球进了!<b>GOAL!</b>',3000);
      burst(-52,1.6,30,50,PALETTE); chord(494);
      setTimeout(()=>{ ballBody.position.copy(ballHome); ballBody.velocity.setZero(); ballBody.angularVelocity.setZero(); },1200);
    }
    if(Math.hypot(bp.x,bp.z)>WATER_R){
      splashSound(); puff(bp.x,0.4,bp.z,12,2.4,2.6,0xffffff);
      ballBody.position.copy(ballHome); ballBody.velocity.setZero(); ballBody.angularVelocity.setZero();
    }
  }

  // 跳台滞空统计
  const onG=wheelsOnGround();
  if(onG===0 && airStart===null && spd>6){ airStart=t; airFrom=[cx,cz]; }
  if(onG>0 && airStart!==null){
    const dist=Math.hypot(cx-airFrom[0],cz-airFrom[1]);
    if(t-airStart>0.55 && dist>5){
      toast('飞了 <b>'+dist.toFixed(1)+'</b> 米!',2600);
      burst(cx,1.4,cz,24,PALETTE); chord(587);
    }
    airStart=null;
  }

  // 翻车自动扶正
  chassisBody.quaternion.vmult(tmpV.set(0,1,0),fwdVec);
  if(fwdVec.y<0.15){ flipTimer+=dt;
    if(flipTimer>2.2){
      flipTimer=0;
      const p=chassisBody.position;
      resetCar(false,new CANNON.Vec3(p.x,p.y+1.6,p.z));
      toast('翻车啦,帮你扶正');
      puff(p.x,1,p.z,8,2,2,0xEADFCC);
    }
  } else flipTimer=0;

  // 落水
  if(Math.hypot(cx,cz)>WATER_R){
    splashSound();
    puff(cx,0.4,cz,16,3,3,0xffffff);
    toast('扑通!还好猫鲨会游泳');
    resetCar(true);
  }

  // 道具落水 → 回家
  for(const s of propsSync){
    const p=s.body.position;
    if(Math.hypot(p.x,p.z)>WATER_R+0.5){ puff(p.x,0.3,p.z,6,1.6,2,0xffffff); resetProp(s); }
  }
}

function drive(dt){
  if(!started){ for(let i=0;i<4;i++){vehicle.applyEngineForce(0,i);vehicle.setBrake(6,i);} return; }
  const throttle=(keys.f?1:0)-(keys.b?1:0)+jy;
  const steer=(keys.l?1:0)-(keys.r?1:0)-jx;
  const spd=carSpeed(); // 正=向前
  const aspd=Math.abs(spd);

  // 转向(高速时收窄)
  const maxSteer=0.58/(1+aspd*0.045);
  steerCur+=(Math.max(-1,Math.min(1,steer))*maxSteer-steerCur)*Math.min(1,dt*10);
  vehicle.setSteeringValue(steerCur,0); vehicle.setSteeringValue(steerCur,1);

  // 油门 / 倒车 / 刹车
  const maxSpd=(nowT<boostUntil)?34:24;
  let force=0, brake=0;
  if(throttle>0.08){
    if(spd<-1) brake=22;                    // 倒车中踩前进 → 先刹
    else if(aspd<maxSpd) force=DRIVE_SIGN*1400*Math.min(1,throttle);
  } else if(throttle<-0.08){
    if(spd>1) brake=26;                     // 前进中踩后退 → 刹车
    else if(aspd<10) force=-DRIVE_SIGN*900*Math.min(1,-throttle);
  } else {
    brake=aspd>0.6?3.2:8;                   // 松手缓停
  }
  // 漂移:后轮减摩擦 + 轻刹
  const drifting=keys.hb&&aspd>4;
  for(let i=0;i<4;i++){
    vehicle.wheelInfos[i].frictionSlip=drifting&&i>=2?0.95:BASE_SLIP;
  }
  vehicle.applyEngineForce(force,2); vehicle.applyEngineForce(force,3);
  vehicle.setBrake(brake,0); vehicle.setBrake(brake,1);
  vehicle.setBrake(brake+(drifting?14:0),2); vehicle.setBrake(brake+(drifting?14:0),3);
  if(throttle>0.08&&aspd>0.5) chassisBody.wakeUp();

  // 引擎声
  if(AC&&engGain){
    const target=soundOn?(0.03+Math.min(0.09,aspd*0.003)+(Math.abs(throttle)>0.08?0.035:0)):0;
    engGain.gain.value+=(target-engGain.gain.value)*Math.min(1,dt*6);
    engOsc.frequency.value=55+aspd*4.6+(Math.abs(throttle)>0.08?16:0);
    engOsc2.frequency.value=engOsc.frequency.value/2;
    skidGain.gain.value+=(((drifting&&wheelsOnGround()>0)?0.11:0)-skidGain.gain.value)*Math.min(1,dt*8);
  }
  // 漂移烟
  if(drifting&&wheelsOnGround()>1&&Math.random()<0.6){
    carForward(fwdVec);
    puff(chassisBody.position.x-fwdVec.x*1.4, 0.25, chassisBody.position.z-fwdVec.z*1.4, 2, 1.4, 1.2, 0xEADFCC);
  }
  // 尾巴摆
  if(tailMesh) tailMesh.rotation.z=steerCur*0.8;
  spdSmooth+=(aspd*3.6-spdSmooth)*Math.min(1,dt*4);
}

let frameN=0;
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(0.05,clock.getDelta());
  const t=clock.getElapsedTime();
  nowT=t; frameN++;

  drive(dt);
  world.step(1/60,dt,3);

  // 同步小车
  carGroup.position.copy(chassisBody.position);
  carGroup.quaternion.copy(chassisBody.quaternion);
  for(let i=0;i<4;i++){
    vehicle.updateWheelTransform(i);
    const tr=vehicle.wheelInfos[i].worldTransform;
    wheelMeshes[i].position.copy(tr.position);
    wheelMeshes[i].quaternion.copy(tr.quaternion);
  }
  // 同步道具
  for(const s of propsSync){
    s.mesh.position.copy(s.body.position);
    s.mesh.quaternion.copy(s.body.quaternion);
  }
  if(ballMesh){ ballMesh.position.copy(ballBody.position); ballMesh.quaternion.copy(ballBody.quaternion); }

  gameplay(dt,t);

  // 海浪(手机隔帧)
  if(!MOBILE||frameN%2===0){
    for(let i=0;i<oceanPos.count;i++){
      oceanPos.setY(i, waveH(oceanBase[i*2],oceanBase[i*2+1],t));
    }
    oceanPos.needsUpdate=true;
  }
  // 蹦鱼
  for(const f of leapFish){
    if(!f.active){ f.wait-=dt; if(f.wait<=0){
        const ang=Math.random()*6.283, dist=ISLAND_R+8+Math.random()*30;
        const fx=Math.sin(ang)*dist, fz=Math.cos(ang)*dist;
        f.spr.position.set(fx,-2,fz);
        f.vx=(Math.random()-.5)*0.12; f.vz=(Math.random()-.5)*0.12; f.vy=0.32+Math.random()*0.2; f.active=true;
      } continue; }
    f.vy-=0.017; f.spr.position.x+=f.vx; f.spr.position.y+=f.vy; f.spr.position.z+=f.vz;
    f.spr.material.rotation=Math.atan2(f.vy,0.2);
    if(f.vy<0&&f.spr.position.y<-2.2){ f.spr.position.set(0,-99,0); f.active=false; f.wait=1+Math.random()*5; }
  }
  // 云
  for(const cl of clouds){ cl.position.x+=cl.userData.v*dt; if(cl.position.x>200)cl.position.x=-200; }
  // 粒子
  updatePool(confetti,dt,9);
  updatePool(puffs,dt,3.5);

  // 相机
  zoom+=(zoomT-zoom)*Math.min(1,dt*6);
  const k=zoom*(1+Math.min(1,spdSmooth/90)*0.14);
  lookAt.set(chassisBody.position.x, chassisBody.position.y+1.2, chassisBody.position.z);
  camPos.lerp(tmp3.set(lookAt.x+camOff.x*k, camOff.y*k, lookAt.z+camOff.z*k), Math.min(1,dt*5));
  camera.position.copy(camPos);
  camera.lookAt(lookAt);
  // 太阳跟车(阴影相机)
  sun.position.set(chassisBody.position.x-30, 52, chassisBody.position.z-12);
  sun.target.position.set(chassisBody.position.x, 0, chassisBody.position.z);

  // 速度表
  if(!MOBILE) $('spdN').textContent=Math.round(spdSmooth);

  renderer.render(scene,camera);
}
const tmp3=new THREE.Vector3();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* ---------- 启动 ---------- */
async function boot(){
  try{ await Promise.race([document.fonts.ready, new Promise(r=>setTimeout(r,4000))]); }catch(e){}
  try{
    await Promise.all(['100px "Press Start 2P"','100px "ZCOOL KuaiLe"','100px "VT323"']
      .map(f=>document.fonts.load(f).catch(()=>{})));
  }catch(e){}
  setProg(0.35);
  buildIsland(); setProg(0.5);
  buildLetters(); buildStatue(); buildBillboards();
  buildCrates(); buildPins(); buildCones(); buildBall(); buildRamp(); buildBoostPads();
  buildFish(); buildDecor(); buildLeapFish();
  // cannon 的 AABB 在构造时缓存,静态/休眠体挪位后必须整体刷新一遍
  world.bodies.forEach(b=>b.updateAABB());
  setProg(Math.max(progress,0.85));
  booted=true;
  loadtxt.textContent='READY';
  $('barFill').style.width='100%';
  $('go').style.display='inline-block';
  if(MOBILE) $('ctlKeys').innerHTML='<span class="key"><b>左摇杆</b> 开车</span><span class="key"><b>右按钮</b> 喵 / 漂移</span><span class="key"><b>靠近展牌</b> 点提示进入</span>';
  loop();
}
$('go').addEventListener('click',()=>{
  initAudio();
  if(AC&&AC.state==='suspended') AC.resume();
  // 解锁 iOS 音频
  meows.forEach(a=>{ a.muted=true; a.play().then(()=>{a.pause();a.currentTime=0;a.muted=false;}).catch(()=>{a.muted=false;}); });
  started=true;
  $('ov').classList.add('off');
  toast('欢迎上岛!去撞点什么吧');
});
boot();

/* 运行时校准:起步后若发现前进方向反了,翻转 DRIVE_SIGN */
let calibrated=false;
setInterval(()=>{
  if(calibrated||!started) return;
  const th=(keys.f?1:0)+jy;
  if(th>0.5){
    const s=carSpeed();
    if(s<-1.2){ DRIVE_SIGN*=-1; calibrated=true; }
    else if(s>1.2) calibrated=true;
  }
},250);

// 调试口
window.__game={chassisBody, vehicle, world, carSpeed, get fishGot(){return fishGot;}, resetCar, keys, setKeys:(k,v)=>{keys[k]=v;},
  scene, carGroup, get finMesh(){return finMesh;}, camera};
</script>
